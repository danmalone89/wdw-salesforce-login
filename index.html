<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WDW Financial</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { height: 100%; }
    body {
      font-family: "Source Sans 3", system-ui, sans-serif;
      color: #fff;
    }

    /* Split layout: branding panel + photo card */
    .page {
      display: flex;
      min-height: 100vh;
      background: linear-gradient(155deg, #003d63 0%, #002942 52%, #001e30 100%);
    }

    .brand {
      flex: 1 1 52%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: clamp(32px, 5.5vmin, 88px);
      gap: clamp(40px, 6vh, 80px);
    }

    .brand-top {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }
    .tagline {
      font-size: clamp(13px, 1.1vw, 18px);
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.66);
    }

    .eyebrow {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.55);
      margin-bottom: 26px;
    }
    .eyebrow::before {
      content: "";
      width: 38px;
      height: 1px;
      background: rgba(255, 255, 255, 0.45);
    }

    .headline {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-weight: 500;
      font-size: clamp(40px, 5.4vw, 82px);
      line-height: 1.08;
      letter-spacing: -0.02em;
      color: #ffffff;
    }
    .headline em { font-style: italic; color: #b3d4e4; }

    .values-label {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.55);
      margin-bottom: 22px;
    }
    .values {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px 48px;
      max-width: 620px;
    }
    .value {
      display: flex;
      align-items: baseline;
      gap: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.14);
    }
    .value .num {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-style: italic;
      font-size: 18px;
      color: rgba(179, 212, 228, 0.85);
      min-width: 22px;
    }
    .value .name { font-size: 17px; font-weight: 600; color: #fff; }

    /* Photo card */
    .media {
      flex: 1 1 48%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4vmin;
    }
    .card {
      width: 100%;
      height: 100%;
      max-height: calc(100vh - 8vmin);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
    }
    #myImage {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    @media (max-width: 900px) {
      .page { flex-direction: column; }
      .brand { order: 2; gap: 36px; }
      .media { order: 1; padding: 5vmin 5vmin 0; min-height: 38vh; }
      .card { max-height: none; min-height: 32vh; }
      .values { grid-template-columns: 1fr; gap: 14px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="brand">
      <div class="brand-top">
        <div class="tagline">Wealth Management &nbsp;&middot;&nbsp; Tax &nbsp;&middot;&nbsp; Retirement</div>
      </div>

      <div class="why">
        <div class="eyebrow">Our Why</div>
        <h1 class="headline">Helping people find <em>clarity and confidence.</em></h1>
      </div>

      <div class="core">
        <div class="values-label">Our Core Values</div>
        <div class="values">
          <div class="value"><span class="num">01</span><span class="name">Do the Right Thing</span></div>
          <div class="value"><span class="num">02</span><span class="name">Be Collaborative</span></div>
          <div class="value"><span class="num">03</span><span class="name">Be Diligent</span></div>
          <div class="value"><span class="num">04</span><span class="name">Remember the Human</span></div>
        </div>
      </div>
    </section>

    <section class="media">
      <div class="card">
        <img id="myImage" alt="Seasonal nature or pet photo" />
      </div>
    </section>
  </div>
  <script>
    // Seasonal nature photos (Northern Hemisphere). One image per season.
    var seasonalNatureUrls = {
      spring: "https://images.unsplash.com/photo-1490750967868-88aa4486c946?q=80&w=1287&auto=format&fit=crop",
      summer: "https://images.unsplash.com/photo-1572246538688-3f326dca3951?q=80&w=1287&auto=format&fit=crop",
      autumn: "https://images.unsplash.com/photo-1507783548227-544c3b8fc065?q=80&w=1287&auto=format&fit=crop",
      winter: "https://images.unsplash.com/photo-1483664852095-d6cc6870702d?q=80&w=1287&auto=format&fit=crop"
    };

    // Determine the current season from the month (Northern Hemisphere).
    function getSeason() {
      var month = new Date().getMonth(); // 0 = January ... 11 = December
      if (month >= 2 && month <= 4) return "spring";  // Mar–May
      if (month >= 5 && month <= 7) return "summer";  // Jun–Aug
      if (month >= 8 && month <= 10) return "autumn"; // Sep–Nov
      return "winter";                                // Dec–Feb
    }

    var natureUrl = seasonalNatureUrls[getSeason()];
    var petUrls = [
      "https://i.ibb.co/m8mFJYH/wen-cat.jpg",
      "https://i.ibb.co/dk7bgsP/wen-cat-two.jpg",
      "https://i.ibb.co/zfDsS8t/miley1.jpg",
      "https://i.ibb.co/DMDD7x0/miley3.jpg",
      "https://i.ibb.co/TWXPg8c/Image-2.jpg",
      "https://i.ibb.co/ZgpqtnD/shelby-dog.jpg",
      "https://i.ibb.co/Y2D9W1M/258743382-10103164180838219-6697138220678460253-n.jpg",
      "https://i.ibb.co/qMP99VJ/coco.jpg",
      "https://i.ibb.co/rf7B8QvB/laura-holifield-dog-2.jpg",
      "https://i.ibb.co/ynbCmPN2/laura-holifield-dog-1.jpg"
    ];

    // Decide randomly to show a nature image or a pet image
    var showNature = Math.random() < 0.5; // 50% chance to show nature image

    var imageUrl = showNature ? natureUrl : petUrls[Math.floor(Math.random() * petUrls.length)];
    var imageElement = document.getElementById("myImage");
    imageElement.src = imageUrl;
  </script>
</body>
</html>
